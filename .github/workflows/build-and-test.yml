name: build_and_test

on:
  pull_request:
    branches:
      - master
      - mainnet-beta

defaults:
  run:
    working-directory: ./swift

env:
  # `drift-rs` and the `drift` crate (protocol-v2-shadow) are consumed as path
  # deps on siblings of this repo (see Cargo.toml). These refs pin which
  # commits CI builds against.
  DRIFT_RS_REF: next
  SHADOW_REF: master

jobs:
  build_and_test:
    runs-on: ubicloud
    container: rust:1.91.1
    timeout-minutes: 10
    strategy:
      matrix:
        task: ["build", "test"]
    steps:
      # Common steps
      - name: Checkout swift
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          path: swift

      - name: Checkout drift-rs
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          repository: drift-labs/drift-rs
          ref: ${{ env.DRIFT_RS_REF }}
          path: drift-rs

      - name: Generate protocol-v2-shadow read token
        id: shadow-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ vars.VELOCITY_SDK_READER_APP_ID }}
          private-key: ${{ secrets.VELOCITY_SDK_READER_PRIVATE_KEY }}
          owner: drift-labs
          repositories: protocol-v2-shadow

      - name: Checkout protocol-v2-shadow
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          repository: drift-labs/protocol-v2-shadow
          ref: ${{ env.SHADOW_REF }}
          token: ${{ steps.shadow-token.outputs.token }}
          path: protocol-v2-shadow

      - name: Install OS dependencies
        run: apt-get update && apt-get install -y git libssl-dev

      - name: Install rustfmt and toolchain
        run: rustup component add rustfmt

      - name: Cache cargo index
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      # Conditional steps based on matrix task
      - name: Fmt
        if: matrix.task == 'build'
        run: cargo fmt

      - name: Build
        if: matrix.task == 'build'
        run: cargo check

      - name: Setup Redis
        if: matrix.task == 'test'
        run: |
          apt-get install -y redis-server redis-tools
          service redis-server start
          redis-server --daemonize yes

      - name: Add test entries to Redis
        if: matrix.task == 'test'
        run: |
          redis-cli set "swift-hashes::test_hash_1" "test_value_1"
          redis-cli set "swift-hashes::test_hash_2" "test_value_2"

      - name: Run tests
        if: matrix.task == 'test'
        run: cargo test
