name: Build Image And Deploy
on:
  push:
    branches: [master]

permissions:
  id-token: write
  contents: read

env:
  # drift-rs + protocol-v2-shadow (the `drift` crate) are path-dep siblings of
  # swift; the docker build context is the parent dir holding all three.
  DRIFT_RS_REF: next
  SHADOW_REF: master

jobs:
  build:
    runs-on: ubicloud
    steps:
      - name: Checkout swift
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          path: swift

      - name: Checkout drift-rs
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          repository: drift-labs/drift-rs
          ref: ${{ env.DRIFT_RS_REF }}
          path: drift-rs

      - name: Generate protocol-v2-shadow read token
        id: shadow-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ vars.VELOCITY_SDK_READER_APP_ID }}
          private-key: ${{ secrets.VELOCITY_SDK_READER_PRIVATE_KEY }}
          owner: drift-labs
          repositories: protocol-v2-shadow

      - name: Checkout protocol-v2-shadow
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          repository: drift-labs/protocol-v2-shadow
          ref: ${{ env.SHADOW_REF }}
          token: ${{ steps.shadow-token.outputs.token }}
          path: protocol-v2-shadow

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_NONPROD }}
          role-session-name: gha-${{ github.run_id }}
          aws-region: ${{ secrets.EKS_NON_PROD_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@19d944daaa35f0fa1d3f7f8af1d3f2e5de25c5b7 # v2.1.4

      - name: Install kubectl
        run: |
          curl -o kubectl https://s3.us-west-2.amazonaws.com/amazon-eks/1.23.7/2022-06-29/bin/linux/amd64/kubectl
          curl https://s3.us-west-2.amazonaws.com/amazon-eks/1.23.7/2022-06-29/bin/linux/amd64/kubectl.sha256
          openssl sha1 -sha256 kubectl
          chmod +x ./kubectl
          kubectl version --client=true

      - name: Docker build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: swift
          IMAGE_TAG: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
        with:
          context: .
          file: swift/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}-${{ env.BRANCH_NAME }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest-${{ env.BRANCH_NAME }}

  deploy:
    runs-on: ubicloud
    needs: [build]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_NONPROD }}
          role-session-name: gha-${{ github.run_id }}
          aws-region: ${{ secrets.EKS_NON_PROD_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@901a10e89ea615cf61f57ac05cecdf23e7de06d8 # v3.2
        with:
          version: "v1.30.0"

      - name: Configure AWS EKS Credentials
        run: aws eks update-kubeconfig --name ${{ secrets.EKS_NON_PROD_CLUSTER_NAME }} --region ${{ secrets.EKS_NON_PROD_REGION }} --role-arn ${{ secrets.EKS_NON_PROD_DEPLOY_ROLE }}

      - name: Restart deployment
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          kubectl rollout restart -n $BRANCH_NAME deployment/swift-server-app
          kubectl rollout restart -n $BRANCH_NAME deployment/swift-confirmation-server-app
          kubectl rollout restart -n $BRANCH_NAME deployment/swift-ws-server-app
